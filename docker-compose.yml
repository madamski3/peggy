services:
  backend:
    build:
      context: ./backend
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://assistant:${DB_PASSWORD}@postgres-postgres-1/assistant
    volumes:
      - ./backend/wiki:/app/wiki
      - ./backend/evals:/app/evals
      - ./backend/app/prompts:/app/app/prompts
    networks:
      - server-network

  frontend:
    build:
      context: ./frontend
    restart: unless-stopped
    ports:
      - '${TAILSCALE_IP}:3002:80'
    depends_on:
      - backend
    networks:
      - server-network

  ntfy:
    image: binwiederhier/ntfy
    restart: unless-stopped
    command: serve
    environment:
      NTFY_BASE_URL: "http://100.94.165.38:8090"
      NTFY_UPSTREAM_BASE_URL: "https://ntfy.sh"
    ports:
      - '${TAILSCALE_IP}:8090:80'
    volumes:
      - ./ntfy-data:/var/lib/ntfy
    networks:
      - server-network

networks:
  server-network:
    external: true
