services:
  backend:
    build:
      context: ./backend
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://assistant:${DB_PASSWORD}@postgres-postgres-1/assistant
    networks:
      - server-network

  frontend:
    build:
      context: ./frontend
    restart: unless-stopped
    ports:
      - '${TAILSCALE_IP}:3002:80'
    depends_on:
      - backend
    networks:
      - server-network

networks:
  server-network:
    external: true
